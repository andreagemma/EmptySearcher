name: Build Release Binaries

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            asset_name: EmptySearcher-windows.zip
          - os: macos-latest
            platform: macos
            asset_name: EmptySearcher-macos.zip
          - os: ubuntu-latest
            platform: linux
            asset_name: EmptySearcher-linux.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build]"

      - name: Build desktop app
        run: pyinstaller --noconfirm --windowed --name EmptySearcher --paths src src/emptysearcher/app.py

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/EmptySearcher -DestinationPath dist/EmptySearcher-windows.zip

      - name: Package macOS build
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/EmptySearcher.app dist/EmptySearcher-macos.zip

      - name: Package Linux build
        if: runner.os == 'Linux'
        run: tar -C dist -czf dist/EmptySearcher-linux.tar.gz EmptySearcher

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: emptysearcher-${{ matrix.platform }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Collect release bundles
        run: |
          mkdir -p dist
          find release-assets -type f -exec cp {} dist/ \;

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/EmptySearcher-windows.zip
            dist/EmptySearcher-macos.zip
            dist/EmptySearcher-linux.tar.gz
